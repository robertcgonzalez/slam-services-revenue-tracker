name: Deploy SLAM Services Revenue Tracker to Azure

# === AUTONOMOUS AGENT PUSH MODEL (Prime Directive + project contracts aligned) ===
# Per .cursor/rules/slam-services.mdc, .grok/AGENT.md, CONSTITUTION.md, and docs/memorialization-discipline.md
# (all synchronized to the dual-agent orchestrator Prime Directive in tools/dual-agent/dual_agent/orchestrator.py):
# Agents (Cursor primary / Grok secondary, including inside dual-agent loops) are expected to run the canonical
# `Scripts/PowerShell/Invoke-GitVerification.ps1`, receive CLEAN, then perform commit + direct `git push origin main`
# themselves with zero handoff to a human. Any such push will trigger this workflow and a production deploy.
# The verification script + Prime Directive "no human sequences" rule are the control plane.
# Reversion to stricter branch protection / PR-only model remains possible via explicit Constitution amendment.
# ===

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: slam-services-revenue-tracker
  AZURE_WEBAPP_PACKAGE_PATH: deploy-package

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Azure publish profile secret
        run: |
          if [ -z "${{ secrets.AZUREAPPSERVICEPUBLISHPROFILE }}" ]; then
            echo "::error::GitHub secret AZUREAPPSERVICEPUBLISHPROFILE is missing or empty."
            echo "Add it under Settings → Secrets and variables → Actions."
            echo "Value: full publish profile XML from Azure Portal → App Service → Get publish profile."
            exit 1
          fi
          echo "Publish profile secret is present."

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies (for lint/test if added later)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build deployment package (flat root, preserve Data on server)
        run: |
          mkdir -p deploy-package
          cp requirements.txt runtime.txt startup.sh apt.txt pyproject.toml deploy-package/
          cp -r App Scripts deploy-package/
          # Data/ is gitignored — not in CI checkout. Use manual zip or Kudu for CSV upload.
          # clean:false below preserves existing Data/ on App Service between code deploys.
          echo "Package contents:"
          find deploy-package -maxdepth 2 -type f | head -40

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: production
          publish-profile: ${{ secrets.AZUREAPPSERVICEPUBLISHPROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
          clean: false

      - name: Post-deploy smoke check
        run: |
          URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "Waiting 45s for cold start..."
          sleep 45
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "302" ]; then
            echo "::warning::Site returned HTTP $HTTP_CODE — verify startup logs and Data/ on Kudu."
          fi
          echo "Manual check: log in and confirm dashboard loads (not CSV path error)."

      - name: Log deployment URL
        run: echo "Deployed to https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
